<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가계부</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f2ece0;
      --surface:     #faf7f2;
      --surface2:    #f5efe4;
      --border:      rgba(160,120,70,0.13);
      --border-hi:   rgba(160,120,70,0.22);
      --shadow:      0 2px 14px rgba(100,65,20,0.08);
      --shadow-lg:   0 8px 32px rgba(100,65,20,0.13);
      --shadow-hero: 0 16px 48px rgba(80,45,10,0.22);

      --text:        #2a1a08;
      --text-2:      #7a5c38;
      --text-3:      #bba07a;

      --income:      #2a8c62;
      --income-bg:   #edf7f3;
      --income-dk:   #1e6b4a;

      --expense:     #c44d28;
      --expense-bg:  #fdf1ec;
      --expense-dk:  #a33a1a;

      --accent:      #a0682a;
      --accent-bg:   #fdf3e4;
      --accent-lt:   #e8c48a;

      --wood-dark:   #5c3820;
      --wood-mid:    #8b5c34;
      --wood-light:  #c49460;

      --r:    18px;
      --r-sm: 12px;
    }

    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 배경 텍스처 느낌 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(200,160,90,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(180,120,60,0.1) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Loading ── */
    .loading-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0;
      background: linear-gradient(90deg, var(--wood-dark), var(--wood-light), var(--accent-lt));
      border-radius: 0 99px 99px 0;
      transition: width 0.3s;
      z-index: 200;
    }
    .loading-bar.active { width: 72%; }
    .loading-bar.done   { width: 100%; opacity: 0; transition: width 0.1s, opacity 0.3s 0.15s; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: var(--wood-dark);
      color: #f5efe4;
      padding: 10px 22px;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: -0.2px;
      opacity: 0;
      transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      white-space: nowrap;
      z-index: 199;
      box-shadow: 0 4px 20px rgba(80,40,10,0.25);
    }
    .toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--expense); }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(242,236,224,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.6px;
      color: var(--wood-dark);
    }

    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--wood-dark), var(--wood-light));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
      box-shadow: 0 2px 8px rgba(92,56,32,0.3);
    }

    .month-nav {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px;
      box-shadow: var(--shadow);
    }

    .nav-btn {
      width: 28px; height: 28px;
      border: none; background: transparent;
      color: var(--text-3);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--accent-bg); color: var(--accent); }

    .month-nav span {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      padding: 0 10px;
      min-width: 82px;
      text-align: center;
    }

    /* ── Layout ── */
    .container {
      position: relative; z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 64px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Hero Card ── */
    .hero {
      background: linear-gradient(145deg, #4a2810 0%, #7a4825 45%, #b07840 80%, #c89850 100%);
      border-radius: 26px;
      padding: 30px 28px 26px;
      color: #fdf5e8;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-hero);
    }

    /* 우드 결 느낌 레이어 */
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        100deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.015) 40px,
        rgba(255,255,255,0.015) 41px
      );
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      top: -90px; right: -80px;
      pointer-events: none;
    }

    .hero-month {
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: rgba(253,245,232,0.55);
      margin-bottom: 8px;
    }

    .hero-balance {
      font-size: 2.9rem;
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1;
      margin-bottom: 4px;
      position: relative;
    }

    .hero-sub {
      font-size: 0.75rem;
      color: rgba(253,245,232,0.45);
      margin-bottom: 24px;
    }

    .hero-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      position: relative;
    }

    .hero-stat {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
    }

    .hero-stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: rgba(253,245,232,0.55);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-dot { width: 5px; height: 5px; border-radius: 50%; }
    .stat-dot.income  { background: #7dffc0; }
    .stat-dot.expense { background: #ffb39a; }

    .hero-stat-val {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.6px;
      color: #fdf5e8;
    }

    /* ── White Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    /* ── Charts ── */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .chart-wrap {
      position: relative;
      height: 180px;
      display: flex; align-items: center; justify-content: center;
    }

    .donut-center {
      position: absolute;
      text-align: center;
      pointer-events: none;
    }
    .dc-val   { font-size: 0.9rem; font-weight: 800; color: var(--text); letter-spacing: -0.4px; }
    .dc-label { font-size: 0.6rem; font-weight: 600; color: var(--text-3); margin-top: 2px; }

    /* ── Form ── */
    .type-toggle {
      display: flex;
      gap: 6px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 14px;
    }

    .type-toggle button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 9px;
      background: transparent;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-3);
      letter-spacing: -0.2px;
      transition: all 0.2s cubic-bezier(.34,1.4,.64,1);
    }

    .type-toggle button.active-income {
      background: var(--income-bg);
      color: var(--income-dk);
      box-shadow: 0 1px 6px rgba(42,140,98,0.15);
    }
    .type-toggle button.active-expense {
      background: var(--expense-bg);
      color: var(--expense-dk);
      box-shadow: 0 1px 6px rgba(196,77,40,0.15);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .field input, .field select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 500;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      letter-spacing: -0.2px;
    }

    .field input::placeholder { color: var(--text-3); }
    .field select option       { background: var(--surface); }

    .field input:focus, .field select:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    .field input[type="number"] { -moz-appearance: textfield; }
    .field input[type="number"]::-webkit-outer-spin-button,
    .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .btn-add {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      border: none;
      border-radius: var(--r-sm);
      font-size: 0.92rem;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: -0.3px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--wood-dark) 0%, var(--wood-mid) 100%);
      color: #fdf5e8;
      box-shadow: 0 4px 16px rgba(92,56,32,0.28);
      transition: all 0.15s;
    }
    .btn-add:hover  { opacity: 0.92; box-shadow: 0 6px 22px rgba(92,56,32,0.36); }
    .btn-add:active { transform: scale(0.98); }
    .btn-add:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── List ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .list-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .filter-select {
      padding: 5px 12px;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 700;
      background: var(--surface);
      color: var(--text-2);
      outline: none;
      cursor: pointer;
    }
    .filter-select:focus { border-color: var(--accent); }

    .tx-list { display: flex; flex-direction: column; gap: 6px; }

    .tx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      animation: slideUp 0.22s cubic-bezier(.34,1.4,.64,1) both;
      transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
    }

    .tx-item:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
      border-color: var(--border-hi);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    .tx-icon {
      width: 42px; height: 42px;
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .tx-icon.income  { background: var(--income-bg); }
    .tx-icon.expense { background: var(--expense-bg); }

    .tx-info { flex: 1; min-width: 0; }

    .tx-desc {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-meta {
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .tx-cat {
      font-size: 0.67rem;
      font-weight: 700;
      color: var(--text-3);
      background: var(--surface2);
      border-radius: 99px;
      padding: 1px 7px;
    }

    .tx-date { font-size: 0.67rem; font-weight: 500; color: var(--text-3); }

    .tx-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .tx-amount {
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: -0.4px;
    }
    .tx-amount.income  { color: var(--income-dk); }
    .tx-amount.expense { color: var(--expense); }

    .tx-delete {
      background: none; border: none;
      color: var(--text-3);
      cursor: pointer;
      width: 26px; height: 26px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      transition: all 0.15s;
      opacity: 0;
    }
    .tx-item:hover .tx-delete { opacity: 1; }
    .tx-delete:hover { background: var(--expense-bg); color: var(--expense); }

    .empty {
      text-align: center;
      padding: 52px 20px;
      color: var(--text-3);
    }
    .empty-icon { font-size: 2.2rem; margin-bottom: 10px; opacity: 0.4; }
    .empty-text { font-size: 0.85rem; font-weight: 600; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>
<div class="toast" id="toast"></div>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    가계부
  </div>
  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">&#8249;</button>
    <span id="monthLabel"></span>
    <button class="nav-btn" id="nextMonth">&#8250;</button>
  </div>
</header>

<div class="container">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-month" id="heroMonth"></div>
    <div class="hero-balance" id="totalBalance">₩0</div>
    <div class="hero-sub">수입 − 지출</div>
    <div class="hero-row">
      <div class="hero-stat">
        <div class="hero-stat-label"><span class="stat-dot income"></span> 수입</div>
        <div class="hero-stat-val" id="totalIncome">₩0</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label"><span class="stat-dot expense"></span> 지출</div>
        <div class="hero-stat-val" id="totalExpense">₩0</div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <div class="card">
      <div class="card-title">6개월 트렌드</div>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">지출 카테고리</div>
      <div class="chart-wrap">
        <div class="donut-center" id="donutCenter">
          <div class="dc-val" id="donutVal">₩0</div>
          <div class="dc-label">이번 달 지출</div>
        </div>
        <canvas id="donutChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <div class="type-toggle">
      <button id="btnIncome" class="active-income" onclick="setType('income')">↑ 수입</button>
      <button id="btnExpense" onclick="setType('expense')">↓ 지출</button>
    </div>
    <div class="form-grid">
      <div class="field"><input type="text" id="inputDesc" placeholder="내용 (예: 점심식사)" maxlength="40" /></div>
      <div class="field"><select id="inputCategory"></select></div>
    </div>
    <div class="form-grid">
      <div class="field"><input type="number" id="inputAmount" placeholder="금액 (원)" min="1" /></div>
      <div class="field"><input type="date" id="inputDate" /></div>
    </div>
    <button class="btn-add" id="btnAdd" onclick="addTransaction()">추가하기</button>
  </div>

  <!-- List -->
  <div class="list-header">
    <div class="list-title" id="listTitle">이번 달 내역</div>
    <select class="filter-select" id="filterType" onchange="renderList()">
      <option value="all">전체</option>
      <option value="income">수입</option>
      <option value="expense">지출</option>
    </select>
  </div>
  <div class="tx-list" id="txList"></div>

</div>

<script>
  const SUPABASE_URL = 'https://taofterpawukrfzgnbkq.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhb2Z0ZXJwYXd1a3JmemduYmtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODA0NzgsImV4cCI6MjA5NzA1NjQ3OH0.oXRNzDt3W-JMX8nwUXdiSmK7Hg0_2S5YVC_zPdEkU1o';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const CATEGORIES = {
    income:  ['월급','부수입','용돈','이자','기타수입'],
    expense: ['식비','교통','쇼핑','문화','의료','통신','주거','교육','기타지출'],
  };

  const ICONS = {
    '월급':'💼','부수입':'💡','용돈':'🎁','이자':'🏦','기타수입':'💰',
    '식비':'🍚','교통':'🚌','쇼핑':'🛍️','문화':'🎬','의료':'🏥',
    '통신':'📱','주거':'🏠','교육':'📚','기타지출':'📌',
  };

  const CAT_COLORS = [
    '#8b5c34','#c44d28','#2a8c62','#c4941a','#5b8ac4',
    '#b85c8a','#4aaa70','#c47a28','#4a9cc4','#9c5cb8',
  ];

  let currentType = 'income';
  let currentYear, currentMonth;
  let txCache = [];
  let trendCache = {};
  let barChartInst = null;
  let donutChartInst = null;

  Chart.defaults.color = '#bba07a';
  Chart.defaults.font.family = "'Pretendard Variable', 'Pretendard', -apple-system, sans-serif";

  function fmt(n) { return '₩' + Math.abs(n).toLocaleString('ko-KR'); }
  function ym(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function loading(on) {
    const bar = document.getElementById('loadingBar');
    bar.className = on ? 'loading-bar active' : 'loading-bar done';
    if (!on) setTimeout(() => bar.className = 'loading-bar', 450);
  }

  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (isError ? ' error' : '');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  async function init() {
    const now = new Date();
    currentYear  = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    document.getElementById('inputDate').value = now.toISOString().slice(0, 10);
    document.getElementById('prevMonth').onclick = () => shiftMonth(-1);
    document.getElementById('nextMonth').onclick = () => shiftMonth(1);
    setType('income');
    await render();
  }

  async function shiftMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    await render();
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btnIncome').className  = type === 'income'  ? 'active-income'  : '';
    document.getElementById('btnExpense').className = type === 'expense' ? 'active-expense' : '';
    const sel = document.getElementById('inputCategory');
    sel.innerHTML = CATEGORIES[type].map(c => `<option>${c}</option>`).join('');
  }

  async function fetchMonth(y, m) {
    const key = ym(y, m);
    if (trendCache[key]) return trendCache[key];
    const start = `${key}-01`;
    const end   = new Date(y, m, 0).toISOString().slice(0, 10);
    const { data, error } = await db
      .from('transactions').select('*')
      .gte('date', start).lte('date', end)
      .order('date', { ascending: false });
    if (error) { console.error(error); return []; }
    trendCache[key] = data;
    return data;
  }

  async function render() {
    loading(true);
    const label = `${currentYear}년 ${currentMonth}월`;
    document.getElementById('monthLabel').textContent = label;
    document.getElementById('heroMonth').textContent  = label;
    document.getElementById('listTitle').textContent  = `${currentMonth}월 내역`;

    txCache = await fetchMonth(currentYear, currentMonth);

    const income  = txCache.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
    const expense = txCache.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('totalIncome').textContent  = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);
    document.getElementById('totalBalance').textContent = (balance < 0 ? '−' : '') + fmt(balance);

    await renderBarChart();
    renderDonutChart(txCache, expense);
    renderList();
    loading(false);
  }

  async function renderBarChart() {
    const labels = [], incomes = [], expenses = [];
    for (let i = 5; i >= 0; i--) {
      let m = currentMonth - i, y = currentYear;
      while (m < 1)  { m += 12; y--; }
      while (m > 12) { m -= 12; y++; }
      labels.push(`${m}월`);
      const txs = await fetchMonth(y, m);
      incomes.push(txs.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0));
      expenses.push(txs.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0));
    }

    const ctx = document.getElementById('barChart').getContext('2d');
    if (barChartInst) barChartInst.destroy();

    barChartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label:'수입', data:incomes,  backgroundColor:'rgba(42,140,98,0.75)',  borderRadius:5, borderSkipped:false },
          { label:'지출', data:expenses, backgroundColor:'rgba(196,77,40,0.75)', borderRadius:5, borderSkipped:false },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{ mode:'index', intersect:false },
        plugins:{
          legend:{ position:'bottom', labels:{ boxWidth:8, boxHeight:8, borderRadius:3, padding:12, font:{size:10,weight:'700'}, color:'#bba07a' } },
          tooltip:{
            backgroundColor:'#2a1a08', borderColor:'rgba(160,120,70,0.2)', borderWidth:1,
            padding:10, cornerRadius:10,
            callbacks:{ label: c => ` ${c.dataset.label}: ${fmt(c.parsed.y)}` },
          },
        },
        scales:{
          x:{ grid:{display:false}, ticks:{font:{size:10,weight:'600'}, color:'#bba07a'}, border:{display:false} },
          y:{
            grid:{color:'rgba(160,120,70,0.07)'}, border:{display:false},
            ticks:{ font:{size:9,weight:'600'}, color:'#bba07a', callback: v => v===0?'0':v>=1000000?(v/1000000).toFixed(0)+'M':(v/1000).toFixed(0)+'K' },
          },
        },
      },
    });
  }

  function renderDonutChart(txs, totalExpense) {
    const ctx = document.getElementById('donutChart').getContext('2d');
    if (donutChartInst) donutChartInst.destroy();

    const catMap = {};
    txs.filter(t => t.type === 'expense').forEach(t => catMap[t.category] = (catMap[t.category]||0) + t.amount);
    const cats = Object.keys(catMap);
    const vals = cats.map(c => catMap[c]);

    if (cats.length === 0) {
      document.getElementById('donutChart').style.display = 'none';
      document.getElementById('donutCenter').innerHTML = '<div style="font-size:0.8rem;color:var(--text-3);font-weight:700">지출 없음</div>';
      return;
    }

    document.getElementById('donutChart').style.display = '';
    document.getElementById('donutCenter').innerHTML = `
      <div class="dc-val">${fmt(totalExpense)}</div>
      <div class="dc-label">이번 달 지출</div>
    `;

    donutChartInst = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: cats,
        datasets: [{ data:vals, backgroundColor:cats.map((_,i)=>CAT_COLORS[i%CAT_COLORS.length]), borderWidth:3, borderColor:['#faf7f2'], hoverOffset:5 }],
      },
      options: {
        responsive:true, maintainAspectRatio:false, cutout:'70%',
        plugins:{
          legend:{ position:'bottom', labels:{ boxWidth:7, boxHeight:7, borderRadius:2, padding:8, font:{size:9,weight:'700'}, color:'#bba07a' } },
          tooltip:{
            backgroundColor:'#2a1a08', borderColor:'rgba(160,120,70,0.2)', borderWidth:1,
            padding:10, cornerRadius:10,
            callbacks:{ label: c => ` ${fmt(c.parsed)}` },
          },
        },
      },
    });
  }

  function renderList() {
    const filter = document.getElementById('filterType').value;
    let filtered = filter === 'all' ? txCache : txCache.filter(t => t.type === filter);
    filtered = [...filtered].sort((a,b) => b.date.localeCompare(a.date));

    const list = document.getElementById('txList');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">내역이 없습니다</div></div>`;
      return;
    }

    list.innerHTML = filtered.map((t, i) => `
      <div class="tx-item" style="animation-delay:${i * 0.03}s">
        <div class="tx-icon ${t.type}">${ICONS[t.category] || '📌'}</div>
        <div class="tx-info">
          <div class="tx-desc">${esc(t.description)}</div>
          <div class="tx-meta">
            <span class="tx-cat">${t.category}</span>
            <span class="tx-date">${t.date}</span>
          </div>
        </div>
        <div class="tx-right">
          <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '−'}${fmt(t.amount)}</div>
          <button class="tx-delete" onclick="deleteTransaction(${t.id})" title="삭제">✕</button>
        </div>
      </div>
    `).join('');
  }

  async function addTransaction() {
    const desc   = document.getElementById('inputDesc').value.trim();
    const amount = parseInt(document.getElementById('inputAmount').value, 10);
    const cat    = document.getElementById('inputCategory').value;
    const date   = document.getElementById('inputDate').value;

    if (!desc)               { toast('내용을 입력하세요.', true); return; }
    if (!amount || amount <= 0) { toast('올바른 금액을 입력하세요.', true); return; }
    if (!date)               { toast('날짜를 선택하세요.', true); return; }

    const btn = document.getElementById('btnAdd');
    btn.disabled = true; loading(true);

    const { error } = await db.from('transactions').insert({ type:currentType, description:desc, amount, category:cat, date });
    btn.disabled = false;

    if (error) { loading(false); toast('저장 실패: ' + error.message, true); return; }

    delete trendCache[ym(currentYear, currentMonth)];
    document.getElementById('inputDesc').value   = '';
    document.getElementById('inputAmount').value = '';
    toast('추가 완료 ✓');
    await render();
  }

  async function deleteTransaction(id) {
    loading(true);
    const { error } = await db.from('transactions').delete().eq('id', id);
    if (error) { loading(false); toast('삭제 실패: ' + error.message, true); return; }
    delete trendCache[ym(currentYear, currentMonth)];
    toast('삭제됨');
    await render();
  }

  init();
</script>
</body>
</html>
