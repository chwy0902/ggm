<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가계부</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e17;
      --surface: #1a1828;
      --surface2: #231f35;
      --border: rgba(255,255,255,0.07);
      --income: #a78bfa;
      --income-dim: rgba(167,139,250,0.12);
      --expense: #fb7185;
      --expense-dim: rgba(251,113,133,0.12);
      --positive: #34d399;
      --text: #e2e0f0;
      --text-muted: #6b6880;
      --text-sub: #9d9ab0;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e1b35 0%, #16132a 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #a78bfa, #fb7185);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo .emoji { -webkit-text-fill-color: initial; font-size: 1.3rem; }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-sub);
    }

    .month-nav button {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text-sub);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .month-nav button:hover {
      background: rgba(167,139,250,0.15);
      border-color: var(--income);
      color: var(--income);
    }

    .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 48px; }

    /* Loading overlay */
    .loading-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0;
      background: linear-gradient(90deg, #a78bfa, #fb7185);
      transition: width 0.3s;
      z-index: 100;
    }

    .loading-bar.active { width: 70%; }
    .loading-bar.done   { width: 100%; opacity: 0; transition: width 0.1s, opacity 0.3s 0.1s; }

    /* Summary */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card.income::before { content:''; position:absolute; inset:0; background:var(--income-dim); border-radius:inherit; }
    .card.expense::before { content:''; position:absolute; inset:0; background:var(--expense-dim); border-radius:inherit; }

    .card .label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card .amount { font-size: 1.1rem; font-weight: 800; position: relative; }
    .card.income .amount  { color: var(--income); }
    .card.expense .amount { color: var(--expense); }
    .card.balance .amount { color: var(--positive); }
    .card.balance .amount.negative { color: var(--expense); }

    /* Charts */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .chart-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .chart-wrap {
      position: relative;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .donut-center {
      position: absolute;
      text-align: center;
      pointer-events: none;
    }

    .donut-center .dc-val   { font-size: 1rem; font-weight: 800; color: var(--text); }
    .donut-center .dc-label { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }

    /* Form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
    }

    .type-toggle button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 9px;
      background: transparent;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .type-toggle button.active-income  { background:var(--income-dim); color:var(--income); box-shadow:0 0 0 1px rgba(167,139,250,0.3); }
    .type-toggle button.active-expense { background:var(--expense-dim); color:var(--expense); box-shadow:0 0 0 1px rgba(251,113,133,0.3); }

    .form-row { display: flex; gap: 10px; margin-bottom: 10px; }

    .form-row input, .form-row select {
      flex: 1;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 11px;
      font-size: 0.88rem;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-row input::placeholder { color: var(--text-muted); }
    .form-row input:focus, .form-row select:focus { border-color: rgba(167,139,250,0.5); background: #1f1c30; }
    .form-row select option { background: #1a1828; }
    .form-row input[type="number"] { -moz-appearance: textfield; }
    .form-row input[type="number"]::-webkit-outer-spin-button,
    .form-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .btn-add {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-add:hover { opacity: 0.9; }
    .btn-add:active { transform: scale(0.98); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    /* List */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .list-header .section-title { margin-bottom: 0; }

    .filter-select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 0.78rem;
      background: var(--surface);
      color: var(--text-sub);
      outline: none;
      cursor: pointer;
    }

    .tx-list { display: flex; flex-direction: column; gap: 8px; }

    .tx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 13px;
      animation: fadeIn 0.2s ease;
      transition: border-color 0.15s;
    }

    .tx-item:hover { border-color: rgba(167,139,250,0.2); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

    .tx-icon {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
    }

    .tx-icon.income  { background: var(--income-dim); }
    .tx-icon.expense { background: var(--expense-dim); }

    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-size: 0.9rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 0.73rem; color: var(--text-muted); margin-top: 3px; }

    .tx-amount { font-size: 0.95rem; font-weight: 800; flex-shrink: 0; }
    .tx-amount.income  { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }

    .tx-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .tx-delete:hover { background: var(--expense-dim); color: var(--expense); }

    .empty {
      text-align: center;
      padding: 44px 20px;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .empty .eicon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.5; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #2a2640;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 99;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }
  </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>
<div class="toast" id="toast"></div>

<header>
  <div class="logo"><span class="emoji">💰</span> 가계부</div>
  <div class="month-nav">
    <button id="prevMonth">&#8249;</button>
    <span id="monthLabel"></span>
    <button id="nextMonth">&#8250;</button>
  </div>
</header>

<div class="container">

  <div class="summary">
    <div class="card income">
      <div class="label">수입</div>
      <div class="amount" id="totalIncome">₩0</div>
    </div>
    <div class="card expense">
      <div class="label">지출</div>
      <div class="amount" id="totalExpense">₩0</div>
    </div>
    <div class="card balance">
      <div class="label">잔액</div>
      <div class="amount" id="totalBalance">₩0</div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <div class="chart-title">6개월 트렌드</div>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">지출 카테고리</div>
      <div class="chart-wrap">
        <div class="donut-center" id="donutCenter">
          <div class="dc-val" id="donutVal">₩0</div>
          <div class="dc-label">이번 달 지출</div>
        </div>
        <canvas id="donutChart"></canvas>
      </div>
    </div>
  </div>

  <div class="form-card">
    <div class="section-title">내역 추가</div>
    <div class="type-toggle">
      <button id="btnIncome" class="active-income" onclick="setType('income')">+ 수입</button>
      <button id="btnExpense" onclick="setType('expense')">− 지출</button>
    </div>
    <div class="form-row">
      <input type="text" id="inputDesc" placeholder="내용 (예: 점심식사)" maxlength="40" />
      <select id="inputCategory"></select>
    </div>
    <div class="form-row">
      <input type="number" id="inputAmount" placeholder="금액 (원)" min="1" />
      <input type="date" id="inputDate" />
    </div>
    <button class="btn-add" id="btnAdd" onclick="addTransaction()">추가하기</button>
  </div>

  <div class="list-header">
    <div class="section-title" id="listTitle">이번 달 내역</div>
    <select class="filter-select" id="filterType" onchange="renderList()">
      <option value="all">전체</option>
      <option value="income">수입</option>
      <option value="expense">지출</option>
    </select>
  </div>
  <div class="tx-list" id="txList"></div>

</div>

<script>
  /* ── Supabase 초기화 ── */
  const SUPABASE_URL = 'https://taofterpawukrfzgnbkq.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhb2Z0ZXJwYXd1a3JmemduYmtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODA0NzgsImV4cCI6MjA5NzA1NjQ3OH0.oXRNzDt3W-JMX8nwUXdiSmK7Hg0_2S5YVC_zPdEkU1o';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const CATEGORIES = {
    income:  ['월급','부수입','용돈','이자','기타수입'],
    expense: ['식비','교통','쇼핑','문화','의료','통신','주거','교육','기타지출'],
  };

  const ICONS = {
    '월급':'💼','부수입':'💡','용돈':'🎁','이자':'🏦','기타수입':'💰',
    '식비':'🍚','교통':'🚌','쇼핑':'🛍️','문화':'🎬','의료':'🏥',
    '통신':'📱','주거':'🏠','교육':'📚','기타지출':'📌',
  };

  const CAT_COLORS = [
    '#a78bfa','#fb7185','#34d399','#fbbf24','#60a5fa',
    '#f472b6','#4ade80','#f97316','#38bdf8','#e879f9',
  ];

  let currentType = 'income';
  let currentYear, currentMonth;
  let txCache = [];        // 현재 달 캐시
  let trendCache = {};     // 월별 캐시 { 'YYYY-MM': [] }
  let barChartInst = null;
  let donutChartInst = null;

  Chart.defaults.color = '#6b6880';
  Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

  /* ── 유틸 ── */
  function fmt(n) { return '₩' + Math.abs(n).toLocaleString('ko-KR'); }
  function ym(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function loading(on) {
    const bar = document.getElementById('loadingBar');
    if (on) { bar.className = 'loading-bar active'; }
    else     { bar.className = 'loading-bar done'; setTimeout(() => bar.className = 'loading-bar', 400); }
  }

  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.borderColor = isError ? 'rgba(251,113,133,0.3)' : 'rgba(167,139,250,0.3)';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  /* ── 초기화 ── */
  async function init() {
    const now = new Date();
    currentYear  = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    document.getElementById('inputDate').value = now.toISOString().slice(0, 10);
    document.getElementById('prevMonth').onclick = () => shiftMonth(-1);
    document.getElementById('nextMonth').onclick = () => shiftMonth(1);
    setType('income');
    await render();
  }

  async function shiftMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    await render();
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btnIncome').className  = type === 'income'  ? 'active-income'  : '';
    document.getElementById('btnExpense').className = type === 'expense' ? 'active-expense' : '';
    const sel = document.getElementById('inputCategory');
    sel.innerHTML = CATEGORIES[type].map(c => `<option>${c}</option>`).join('');
  }

  /* ── Supabase 조회 ── */
  async function fetchMonth(y, m) {
    const key = ym(y, m);
    if (trendCache[key]) return trendCache[key];

    const start = `${key}-01`;
    const end   = `${key}-31`;
    const { data, error } = await db
      .from('transactions')
      .select('*')
      .gte('date', start)
      .lte('date', end)
      .order('date', { ascending: false });

    if (error) { console.error(error); return []; }
    trendCache[key] = data;
    return data;
  }

  /* ── 렌더링 ── */
  async function render() {
    loading(true);
    document.getElementById('monthLabel').textContent = `${currentYear}년 ${currentMonth}월`;
    document.getElementById('listTitle').textContent  = `${currentMonth}월 내역`;

    txCache = await fetchMonth(currentYear, currentMonth);

    const income  = txCache.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
    const expense = txCache.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('totalIncome').textContent  = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);
    const balEl = document.getElementById('totalBalance');
    balEl.textContent = (balance < 0 ? '-' : '') + fmt(balance);
    balEl.className   = 'amount' + (balance < 0 ? ' negative' : '');

    await renderBarChart();
    renderDonutChart(txCache, expense);
    renderList();
    loading(false);
  }

  async function renderBarChart() {
    const labels = [], incomes = [], expenses = [];

    for (let i = 5; i >= 0; i--) {
      let m = currentMonth - i, y = currentYear;
      while (m < 1)  { m += 12; y--; }
      while (m > 12) { m -= 12; y++; }
      labels.push(`${m}월`);
      const txs = await fetchMonth(y, m);
      incomes.push(txs.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0));
      expenses.push(txs.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0));
    }

    const ctx = document.getElementById('barChart').getContext('2d');
    if (barChartInst) barChartInst.destroy();

    barChartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label:'수입', data:incomes,  backgroundColor:'rgba(167,139,250,0.7)', borderRadius:6, borderSkipped:false },
          { label:'지출', data:expenses, backgroundColor:'rgba(251,113,133,0.7)', borderRadius:6, borderSkipped:false },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { position:'bottom', labels:{ boxWidth:10, boxHeight:10, borderRadius:3, padding:10, font:{size:10} } },
          tooltip: {
            backgroundColor:'#1a1828', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, padding:10,
            callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}` },
          },
        },
        scales: {
          x: { grid:{display:false}, ticks:{font:{size:10}}, border:{display:false} },
          y: {
            grid:{color:'rgba(255,255,255,0.04)'}, border:{display:false},
            ticks:{ font:{size:9}, callback: v => v===0?'0':v>=1000000?(v/1000000).toFixed(0)+'M':(v/1000).toFixed(0)+'K' },
          },
        },
      },
    });
  }

  function renderDonutChart(txs, totalExpense) {
    const ctx = document.getElementById('donutChart').getContext('2d');
    if (donutChartInst) donutChartInst.destroy();

    document.getElementById('donutVal').textContent = fmt(totalExpense);

    const catMap = {};
    txs.filter(t => t.type === 'expense').forEach(t => catMap[t.category] = (catMap[t.category]||0) + t.amount);
    const cats = Object.keys(catMap);
    const vals = cats.map(c => catMap[c]);

    if (cats.length === 0) {
      document.getElementById('donutChart').style.display = 'none';
      document.getElementById('donutCenter').innerHTML = '<div style="font-size:0.82rem;color:var(--text-muted)">지출 없음</div>';
      return;
    }

    document.getElementById('donutChart').style.display = '';
    document.getElementById('donutCenter').innerHTML = `
      <div class="dc-val">${fmt(totalExpense)}</div>
      <div class="dc-label">이번 달 지출</div>
    `;

    donutChartInst = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: cats,
        datasets: [{ data:vals, backgroundColor:cats.map((_,i)=>CAT_COLORS[i%CAT_COLORS.length]), borderWidth:0, hoverOffset:6 }],
      },
      options: {
        responsive:true, maintainAspectRatio:false, cutout:'68%',
        plugins: {
          legend:{ position:'bottom', labels:{boxWidth:8,boxHeight:8,borderRadius:2,padding:8,font:{size:9}} },
          tooltip:{
            backgroundColor:'#1a1828', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, padding:10,
            callbacks:{ label: ctx => ` ${fmt(ctx.parsed)}` },
          },
        },
      },
    });
  }

  function renderList() {
    const filter = document.getElementById('filterType').value;
    let filtered = filter === 'all' ? txCache : txCache.filter(t => t.type === filter);
    filtered = [...filtered].sort((a,b) => b.date.localeCompare(a.date));

    const list = document.getElementById('txList');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="eicon">📭</div>내역이 없습니다.</div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="tx-item">
        <div class="tx-icon ${t.type}">${ICONS[t.category] || '📌'}</div>
        <div class="tx-info">
          <div class="tx-desc">${esc(t.description)}</div>
          <div class="tx-meta">${t.category} · ${t.date}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '−'}${fmt(t.amount)}</div>
        <button class="tx-delete" onclick="deleteTransaction(${t.id})" title="삭제">✕</button>
      </div>
    `).join('');
  }

  /* ── CRUD ── */
  async function addTransaction() {
    const desc   = document.getElementById('inputDesc').value.trim();
    const amount = parseInt(document.getElementById('inputAmount').value, 10);
    const cat    = document.getElementById('inputCategory').value;
    const date   = document.getElementById('inputDate').value;

    if (!desc)              { toast('내용을 입력하세요.', true); return; }
    if (!amount || amount <= 0) { toast('올바른 금액을 입력하세요.', true); return; }
    if (!date)              { toast('날짜를 선택하세요.', true); return; }

    const btn = document.getElementById('btnAdd');
    btn.disabled = true;
    loading(true);

    const { error } = await db.from('transactions').insert({
      type: currentType,
      description: desc,
      amount,
      category: cat,
      date,
    });

    btn.disabled = false;

    if (error) { loading(false); toast('저장 실패: ' + error.message, true); return; }

    // 캐시 무효화
    delete trendCache[ym(currentYear, currentMonth)];

    document.getElementById('inputDesc').value   = '';
    document.getElementById('inputAmount').value = '';
    toast('추가 완료 ✓');
    await render();
  }

  async function deleteTransaction(id) {
    loading(true);
    const { error } = await db.from('transactions').delete().eq('id', id);
    if (error) { loading(false); toast('삭제 실패: ' + error.message, true); return; }

    delete trendCache[ym(currentYear, currentMonth)];
    toast('삭제됨');
    await render();
  }

  init();
</script>
</body>
</html>
